<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Calculo Carro</title>
</head>
<body>
    <div class="container">
        <h1>Cadastro de Veículos</h1>

        <!-- FORMULÁRIO -->
        <form id="formVeiculo">
            <div class="inputs">
                <label>Modelo:</label>
                <input type="text" id="modelo" required> <br>

                <label>Marca:</label>
                <input type="text" id="marca" required> <br>

                <label>Placa:</label>
                <input type="text" id="placa" required> <br>

                <label>Ano de Fabricação:</label>
                <input type="number" id="ano" required> <br>

                <label>Valor do Veículo:</label>
                <input type="number" id="valor" required> <br>

                <label>Cor do Veículo:</label>
                <input type="text" id="cor" required> <br>
            </div>

            <div class="tipo_Combust">

                <p>Tipo de Combustível:</p>

                <label><input type="radio" name="combustivel" value="gasolina" required> Gasolina</label>

                <label><input type="radio" name="combustivel" value="etanol"> Etanol</label>

                <label><input type="radio" name="combustivel" value="bicombustivel"> Bicombustível</label>

                <label><input type="radio" name="combustivel" value="hibrido"> Híbrido</label>

                <label><input type="radio" name="combustivel" value="eletrico"> Elétrico</label>

            </div>
            <br>

            <button type="submit">Adicionar Veículo</button>
        </form>
    </div>

    <div class="lista">
    <h2>Lista de Veículos Cadastrados</h2>

    <div id="veiculoList">

        <div class="card-veiculo">
            <p><strong>Modelo:</strong> Corolla</p>
            <p><strong>Marca:</strong> Toyota</p>
            <p><strong>Placa:</strong> ABC-1234</p>
            <p><strong>Ano:</strong> 2022</p>
            <p><strong>Valor:</strong> R$ 90.000</p>
            <p><strong>Cor:</strong> Prata</p>
            <p><strong>Combustível:</strong> Gasolina</p>
        </div>

        <div class="card-veiculo">
            <p><strong>Modelo:</strong> Civic</p>
            <p><strong>Marca:</strong> Honda</p>
            <p><strong>Placa:</strong> XYZ-5678</p>
            <p><strong>Ano:</strong> 2021</p>
            <p><strong>Valor:</strong> R$ 85.000</p>
            <p><strong>Cor:</strong> Preto</p>
            <p><strong>Combustível:</strong> Flex</p>
        </div>

    </div>
</div>
    
</body>
</html>
